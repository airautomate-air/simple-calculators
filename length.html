<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Length Converter - Simple Calculators</title>
    <meta name="description" content="Instantly convert between millimeters, centimeters, meters, kilometers, inches, feet, yards, miles, and nautical miles. Free, no ads, no tracking.">
    <link rel="stylesheet" href="style.css">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Q5KY6BP0VV"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-Q5KY6BP0VV');
</script>
</head>
<body>
    <div class="container">
        <h1>Length Converter</h1>
        <div class="calculator">
            <div class="input-group">
                <label for="length-value">Length:</label>
                <input type="number" id="length-value" placeholder="Enter value" step="any">
            </div>
            <div class="input-group">
                <label for="length-unit">Unit:</label>
                <select id="length-unit">
                    <option value="mm">Millimeters (mm)</option>
                    <option value="cm">Centimeters (cm)</option>
                    <option value="m">Meters (m)</option>
                    <option value="km">Kilometers (km)</option>
                    <option value="in">Inches (in)</option>
                    <option value="ft">Feet (ft)</option>
                    <option value="yd">Yards (yd)</option>
                    <option value="mi">Miles (mi)</option>
                    <option value="nmi">Nautical miles (nmi)</option>
                </select>
            </div>
        </div>
        <div class="results">
            <h2>Conversions</h2>
            <div class="result-item" id="result-mm">Millimeters: <span>-</span></div>
            <div class="result-item" id="result-cm">Centimeters: <span>-</span></div>
            <div class="result-item" id="result-m">Meters: <span>-</span></div>
            <div class="result-item" id="result-km">Kilometers: <span>-</span></div>
            <div class="result-item" id="result-in">Inches: <span>-</span></div>
            <div class="result-item" id="result-ft">Feet: <span>-</span></div>
            <div class="result-item" id="result-yd">Yards: <span>-</span></div>
            <div class="result-item" id="result-mi">Miles: <span>-</span></div>
            <div class="result-item" id="result-nmi">Nautical miles: <span>-</span></div>
        </div>
        <p class="hint">Enter a value and select unit to see conversions to all other units.</p>
    </div>
    <script src="length.js"></script>
</body>
</html>
