<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter - Simple Calculators</title>
    <meta name="description" content="Instantly convert between Celsius, Fahrenheit, and Kelvin. Free, no ads, no tracking.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Temperature Converter</h1>
        <div class="calculator">
            <label for="celsius">Celsius:</label>
            <input type="number" id="celsius" placeholder="°C" step="0.01">
            
            <label for="fahrenheit">Fahrenheit:</label>
            <input type="number" id="fahrenheit" placeholder="°F" step="0.01">
            
            <label for="kelvin">Kelvin:</label>
            <input type="number" id="kelvin" placeholder="K" step="0.01">
        </div>
        <p class="hint">Enter a value in any field to convert to the other two.</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
